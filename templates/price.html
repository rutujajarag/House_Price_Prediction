<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOUSE PRICE PREDICTION</title>
</head>
<body>
    <form method="POST">

        <label> Enter size in sqft:</label>
        <input type="number" name="sq"><br><br>

        <label> Enter no_of_bedrooms:</label>
        <input type="number" name="bed"><br><br>

        <label> Enter no_of_bathrooms: </label>
        <input type="number" name="br"><br><br>

        <label> Enter age_of_house_years:</label>
        <input type="number" name="age"><br><br>

        <label> Enter distance_to_city_centre_miles:</label>
        <input type="number" name="dtc"><br><br>

        <input type="submit" value="Predict price">

    </form>

</body>
</html>
